  <text fill="#2C2F33" font-family="Inter" font-size="40" font-weight="bold"><tspan x="100" y="2200">Мой путь в IT</tspan></text>
  <text fill="#2C2F33" font-family="Inter" font-size="18" line-height="1.8">
    <tspan x="100" y="2260">Мой путь начался не с кода, а с желания созидать. Я всегда смотрела на сайты как на цифровое искусство, но долго не решалась заглянуть «под капот». Тот момент стал отправной точкой. </tspan>
    <tspan x="100" y="2295">Всё изменилось, когда я написала свои первые строчки HTML. Я поняла, что фронтенд — это идеальный баланс между логикой и эстетикой, который я так долго искала.</tspan>
    <tspan x="100" y="2330">Процесс обучения стал для меня ежедневным ритуалом, полюбила это состояние «потока», когда сложная задача наконец решается после десятка попыток.</tspan>
    
    <tspan x="100" y="2385">Были моменты, когда CSS не слушался, а блоки разъезжались, но именно это научило меня терпению и внимательности к деталям. Упорство — ключ к успеху.</tspan>
    <tspan x="100" y="2420">Я не просто учу синтаксис, я учусь думать как разработчик, структурировать информацию и находить самые элегантные решения для интерфейсов.</tspan>
    <tspan x="100" y="2455">Этот сайт — маленькая победа и доказательство того, что я на верном пути.</tspan>
    
    <tspan x="100" y="2510">Впереди еще много неизведанного: от логики JavaScript до сложных фреймворков. Впереди еще много неизведанного. Цель ясна.</tspan>
    <tspan x="100" y="2545">Цель: стать профессионалом и создавать полезные, красивые веб-приложения.</tspan>
  </text>
  <text fill="#6A8D92" font-family="Inter" font-size="24" font-weight="bold"><tspan x="100" y="2680">Что мне осталось изучить:</tspan></text>
