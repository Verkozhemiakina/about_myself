  <path d="M100 1820H1340" stroke="#E5EBED" stroke-width="2"/> <text fill="#6A8D92" font-family="Inter" font-size="18" font-weight="bold">
    <tspan x="150" y="1800">День</tspan>
    <tspan x="350" y="1800">Тема</tspan>
